language: "en-US"
tone_instructions: >
  Prioritize bugs, logic errors, and security issues. Post only critical issues
  as actionable comments. All other findings — style, best practices, minor
  improvements — must be nitpick comments.

reviews:
  request_changes_workflow: false
  profile: "chill"
  high_level_summary: true
  poem: false
  sequence_diagrams: false
  auto_review:
    enabled: true
    base_branches: ["main"]
    path_filters:
      - "!docs/**"
      - "!**/README.md"
      - "!PLUGINS.md"
  path_instructions:
    - path: "plugins/patternfly/**"
      instructions: >
        PatternFly plugin domain. If this PR also modifies files under
        plugins/uxd-*, flag it as a cross-boundary change and verify that
        both team approvals are required via CODEOWNERS.
    - path: "plugins/uxd-*/**"
      instructions: >
        UXD plugin domain. If this PR also modifies files under
        plugins/patternfly/, flag it as a cross-boundary change and verify
        that both team approvals are required via CODEOWNERS.
    - path: "plugins/**/SKILL.md"
      instructions: >
        Review against CONTRIBUTING-SKILLS.md. Check: frontmatter has name and
        description, description includes trigger contexts, content describes
        outcomes not implementation, skill is tool-agnostic (must work in both
        Claude Code and Cursor — no tool-specific references). Security: flag
        hardcoded secrets, tokens, or credentials, instructions that tell the AI to disable
        permissions, skip verification, send data to external services without
        user confirmation, access secrets/credentials, or access files outside
        the target project directory without explicit justification. Do not
        flag pf- or uxd- prefix naming or markdown formatting.
    - path: "plugins/**/skills/**"
      instructions: >
        Consumer-facing skills are expected to have an eval.yaml in
        eval/<skill-name>/. If this PR adds or significantly modifies a
        consumer skill and no corresponding eval exists, flag it as a
        nitpick reminder.
    - path: "plugins/**/agents/*.md"
      instructions: >
        Review against CONTRIBUTING-SKILLS.md. Agents provide domain knowledge
        the AI follows across all interactions in the plugin's area — they are
        not tasks that produce results (those are skills). Must be tool-agnostic.
        Agent descriptions follow a different pattern than skills: [Domain noun]
        [what it covers]. [Active when + context.] — no action-verb lead-ins.
        Flag agents that use the skill formula (action-verb lead-ins like
        "Define", "Standardize", "Generate").
    - path: "**/.claude-plugin/**"
      instructions: >
        Manifests must be identical in .claude-plugin/ and .cursor-plugin/.
        If this file changed, verify the corresponding file in the other
        directory has the exact same content. Flag any differences.
    - path: "**/.cursor-plugin/**"
      instructions: >
        Manifests must be identical in .claude-plugin/ and .cursor-plugin/.
        If this file changed, verify the corresponding file in the other
        directory has the exact same content. Flag any differences.
    - path: "plugins/**/*.{js,sh,py,ts}"
      instructions: >
        Review for bugs, logic errors, security issues, and broken behavior.
        Security checklist: flag hardcoded secrets, tokens, or credentials, curl piped to
        shell (curl | bash), use of --no-verify or --force flags, unquoted
        variables in shell commands, use of eval or exec, access to
        files or resources outside the target project without explicit
        justification, and any network requests to URLs not provided by the
        user. Do not flag style or formatting.
    - path: ".github/workflows/**"
      instructions: >
        GitHub Actions workflow files. Security checklist: actions must be
        pinned to commit SHAs (not mutable tags like @v4), permissions must
        be scoped to individual jobs (not workflow level), checkout steps
        must set persist-credentials: false, secrets must not be exposed to
        jobs that don't need them, and ${{ }} expressions must not appear
        in run: blocks with user-controlled input (use env: instead). Flag
        npm install or plugin install commands that use floating versions.
    - path: "scripts/**"
      instructions: >
        Repo-level automation scripts. Review for bugs, correctness, and
        broken behavior. Security checklist: flag hardcoded secrets, tokens,
        or credentials, curl piped to shell (curl | bash), use of --no-verify
        or --force flags, unquoted variables in shell commands, use of eval
        or exec. Do not flag style or formatting.
    - path: "CONTRIBUTING*.md"
      instructions: >
        Source-of-truth guidelines that CodeRabbit and human reviewers use to
        evaluate all contributions. Changes here affect every future review.
        Verify accuracy, check for contradictions, and ensure the plugin
        taxonomy table stays consistent with the actual plugins/ directory.
    - path: "eval/**"
      instructions: >
        Eval configs and test cases for skill evaluation. Each eval lives in
        eval/<skill-name>/eval.yaml. Verify that the skill-name directory
        matches a real skill in plugins/. Test cases should be discriminating
        (test what the skill uniquely contributes, not base model knowledge).

knowledge_base:
  web_search:
    enabled: false
  learnings:
    scope: "local"
  code_guidelines:
    enabled: true
    filePatterns:
      - "CONTRIBUTING.md"
      - "CONTRIBUTING-SKILLS.md"
