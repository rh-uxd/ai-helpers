# Auto-label config for actions/labeler
# Labels are applied by .github/workflows/auto-label.yml

# Plugin area labels
area/pf-react:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-react/**

area/pf-design-guide:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-design-guide/**

area/pf-design-audit:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-design-audit/**

area/pf-a11y:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-a11y/**

area/pf-migration:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-migration/**

area/pf-code-review:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-code-review/**

area/pf-workshop:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-workshop/**

area/pf-mcp:
  - changed-files:
      - any-glob-to-any-file: plugins/patternfly/pf-mcp/**

area/uxd-workshop:
  - changed-files:
      - any-glob-to-any-file: plugins/uxd-workshop/**

# Content-type labels
skill:
  - changed-files:
      - any-glob-to-any-file: plugins/**/skills/**

agent:
  - changed-files:
      - any-glob-to-any-file: plugins/**/agents/**

eval:
  - changed-files:
      - any-glob-to-any-file: plugins/**/eval/**

manifest:
  - changed-files:
      - any-glob-to-any-file:
          - '**/.claude-plugin/**'
          - '**/.cursor-plugin/**'

automation:
  - changed-files:
      - any-glob-to-any-file: scripts/**

ci:
  - changed-files:
      - any-glob-to-any-file: .github/workflows/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - docs/**
          - '*.md'
          - '!PLUGINS.md'
