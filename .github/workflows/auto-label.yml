name: Auto-Label PRs

on:
  pull_request:
    types: [opened, reopened, synchronize]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Apply labels based on changed paths
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const { data: files } = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              per_page: 100,
            });

            const paths = files.map(f => f.filename);
            const labels = new Set();

            // Plugin-level labels
            const pluginPattern = /^plugins\/(?:patternfly\/)?([^./][^/]*)\//;
            for (const path of paths) {
              const match = path.match(pluginPattern);
              if (match) labels.add(`area/${match[1]}`);
            }

            // Content-type labels
            if (paths.some(p => p.includes('/skills/'))) labels.add('skill');
            if (paths.some(p => p.includes('/agents/'))) labels.add('agent');
            if (paths.some(p => p.includes('/eval/'))) labels.add('eval');
            if (paths.some(p => p.includes('plugin.json') || p.includes('marketplace.json'))) labels.add('manifest');
            if (paths.some(p => p.startsWith('scripts/'))) labels.add('automation');
            if (paths.some(p => /^(CONTRIBUTING|GOVERNANCE|MIGRATION|SETUP|CLAUDE)/.test(p.split('/').pop()))) labels.add('docs');

            // Cross-boundary detection
            const pfChanged = paths.some(p => p.startsWith('plugins/patternfly/'));
            const uxdChanged = paths.some(p => p.startsWith('plugins/') && !p.startsWith('plugins/patternfly/'));
            if (pfChanged && uxdChanged) labels.add('cross-boundary');

            if (labels.size === 0) return;

            try {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels: [...labels],
              });
            } catch (err) {
              if (err.status === 403) {
                core.info('Skipping labels — insufficient permissions (expected for fork PRs)');
                return;
              }
              throw err;
            }
