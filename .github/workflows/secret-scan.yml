name: Secret & Internal URL Scan

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'docs/**'
      - '*.md'

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Scan for internal URLs and secrets
        run: |
          EXIT_CODE=0

          echo "=== Scanning for internal URLs ==="
          # Match internal-only domains. Public URLs (ux.redhat.com,
          # brand.redhat.com, patternfly.org) and example.com placeholders
          # are excluded via grep -v.
          if grep -rn \
            --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' \
            --include='*.sh' --include='*.js' --include='*.ts' --include='*.py' \
            -E '(\.corp\.|enterprise\.slack\.com|pages\.redhat\.com|mcp\.dataverse\.)' \
            --exclude-dir=.git \
            --exclude='secret-scan.yml' \
            . \
            | grep -v 'example\.com' \
            | grep -v 'SECURITY\.md' ; then
            echo "::error::Found internal URLs in tracked files. Replace with environment variable references or remove."
            EXIT_CODE=1
          fi

          echo ""
          echo "=== Scanning for potential secrets ==="
          if grep -rn \
            --include='*.md' --include='*.json' --include='*.yaml' --include='*.yml' \
            --include='*.sh' --include='*.js' --include='*.ts' --include='*.py' \
            -E '(ATATT3x|xoxb-|xoxp-|ghp_|ghs_|sk-[a-zA-Z0-9]{20,})' \
            --exclude-dir=.git \
            --exclude='secret-scan.yml' \
            . ; then
            echo "::error::Found potential secrets in tracked files."
            EXIT_CODE=1
          fi

          exit $EXIT_CODE
