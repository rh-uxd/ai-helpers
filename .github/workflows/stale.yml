name: Close stale issues and PRs
on:
  schedule:
    - cron: '0 12 * * *'
jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@5bef64f19d7facfb25b37b414482c7164d639639 # v9
        with:
          days-before-stale: 90
          days-before-close: 7
          exempt-issue-labels: pinned
          exempt-pr-labels: pinned
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: >-
            This issue has been automatically marked as stale after 90 days
            of inactivity. It will be closed in 7 days if there's no further
            activity. Feel free to comment or reopen if this is still relevant.
          stale-pr-message: >-
            This PR has been automatically marked as stale after 90 days
            of inactivity. It will be closed in 7 days if there's no further
            activity. Feel free to reopen or push new commits if you'd like
            to continue working on it.
