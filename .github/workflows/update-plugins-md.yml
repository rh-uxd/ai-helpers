name: Update PLUGINS.md

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['plugins/**']

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: webfactory/ssh-agent@a6f90b1f127823b31d4d4a8d96047790581349bd # v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}
      - run: git remote set-url origin git@github.com:rh-uxd/ai-helpers.git
      - run: |
          bash scripts/generate-plugins-md.sh
          git diff --quiet PLUGINS.md README.md CONTRIBUTING-SKILLS.md plugins/*/README.md plugins/*/*/README.md || {
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PLUGINS.md README.md CONTRIBUTING-SKILLS.md plugins/*/README.md plugins/*/*/README.md
            git commit -m "docs: auto-update generated plugin docs"
            git pull --rebase
            git push
          }
