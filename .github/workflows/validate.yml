name: Validate

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - '.cursor-plugin/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate manifests and skill consistency
        run: bash scripts/validate-manifests.sh

      - name: Validate skill and agent integrity
        run: bash scripts/validate-skills.sh
