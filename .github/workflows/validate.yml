name: Validate

on:
  pull_request:
    paths:
      - 'plugins/**'
      - '.claude-plugin/**'
      - '.cursor-plugin/**'
      - 'scripts/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate manifests and skill consistency
        run: bash scripts/validate-manifests.sh

      - name: Check generated docs are up to date
        run: |
          bash scripts/generate-plugins-md.sh
          GENERATED_FILES="PLUGINS.md README.md CONTRIBUTING-SKILLS.md"
          GENERATED_GLOBS="plugins/*/README.md plugins/*/*/README.md"
          if ! git diff --quiet $GENERATED_FILES $GENERATED_GLOBS 2>/dev/null; then
            echo "::error::Generated docs are out of date. Run 'bash scripts/generate-plugins-md.sh' and commit the result."
            git diff $GENERATED_FILES $GENERATED_GLOBS 2>/dev/null
            exit 1
          fi
          UNTRACKED=$(git ls-files --others --exclude-standard $GENERATED_FILES $GENERATED_GLOBS 2>/dev/null || true)
          if [[ -n "$UNTRACKED" ]]; then
            echo "::error::New generated files need to be committed: $UNTRACKED"
            exit 1
          fi

      - name: Validate skill integrity
        run: |
          ERRORS=0

          while IFS= read -r skill_file; do
            dir_name=$(basename "$(dirname "$skill_file")")

            # Check required frontmatter fields
            fm_name=$(awk '/^---$/{if(++c==2)exit} c==1 && /^name:/{sub(/^name: */, ""); gsub(/["'"'"']/, ""); print; exit}' "$skill_file")
            fm_desc=$(awk '/^---$/{if(++c==2)exit} c==1 && /^description:/{sub(/^description: */, ""); gsub(/["'"'"']/, ""); print; exit}' "$skill_file")

            if [[ -z "$fm_name" ]]; then
              echo "::error file=${skill_file}::Missing 'name' in frontmatter"
              ERRORS=$((ERRORS + 1))
            elif [[ "$fm_name" != "$dir_name" ]]; then
              echo "::error file=${skill_file}::Frontmatter name '${fm_name}' does not match directory '${dir_name}'"
              ERRORS=$((ERRORS + 1))
            fi

            if [[ -z "$fm_desc" ]]; then
              echo "::error file=${skill_file}::Missing 'description' in frontmatter"
              ERRORS=$((ERRORS + 1))
            fi
          done < <(find plugins -name 'SKILL.md' 2>/dev/null)

          if [[ "$ERRORS" -gt 0 ]]; then
            echo "${ERRORS} skill integrity error(s) found."
            exit 1
          else
            SKILL_COUNT=$(find plugins -name 'SKILL.md' 2>/dev/null | wc -l | tr -d ' ')
            echo "Validated ${SKILL_COUNT} skill(s), 0 errors."
          fi
