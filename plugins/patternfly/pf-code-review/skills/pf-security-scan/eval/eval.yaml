name: pf-security-scan-eval
description: Evaluate pf-security-scan's detection of PF-specific XSS and insecure URL patterns

skill: pf-code-review:pf-security-scan

execution:
  mode: case
  arguments: "{prompt}"

runner:
  type: claude-code

models:
  skill: claude-sonnet-4-6
  judge: claude-sonnet-4-6

permissions:
  allow: []
  deny:
    - "mcp__*"

dataset:
  path: cases
  schema: |
    Each case directory contains:
    - input.yaml: prompt field with a realistic user request
    - annotations.yaml: expect_violations, violation_type, expected_sinks,
      expected_severity (for violation cases)
    - A .tsx fixture file the prompt references

outputs:
  - path: artifacts
    schema: |
      The skill produces a text report listing security findings with
      file name, line number, severity, risk description, and fix guidance.

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

judges:
  - name: flags_xss_risk
    description: Identifies concrete XSS sinks from case annotations with risk classification
    if: "annotations.get('expect_violations') == True and annotations.get('violation_type') == 'xss'"
    check: |
      text = outputs.get("conversation", "")
      text_lower = text.lower()
      annots = outputs.get("annotations", {})
      expected_sinks = annots.get("expected_sinks", [])
      expected_severity = str(annots.get("expected_severity", "critical")).lower()
      if not expected_sinks:
          return False, "Test case missing expected_sinks annotation"
      missing = [s for s in expected_sinks if s.lower() not in text_lower]
      if missing:
          return False, f"Missing expected sinks: {missing}"
      if expected_severity not in text_lower:
          return False, f"Missing risk classification: {expected_severity}"
      return True, f"Flagged expected XSS sinks with {expected_severity}: {expected_sinks}"

  - name: flags_insecure_href
    description: "Identifies unvalidated or javascript: href patterns in PF link components"
    if: "annotations.get('expect_violations') == True and annotations.get('violation_type') == 'href'"
    check: |
      text = outputs.get("conversation", "")
      text_lower = text.lower()
      annots = outputs.get("annotations", {})
      expected_sinks = annots.get("expected_sinks", [])
      expected_severity = str(annots.get("expected_severity", "critical")).lower()
      if not expected_sinks:
          return False, "Test case missing expected_sinks annotation"
      missing = [s for s in expected_sinks if s.lower() not in text_lower]
      if missing:
          return False, f"Missing expected sinks: {missing}"
      if expected_severity not in text_lower:
          return False, f"Missing risk classification: {expected_severity}"
      return True, f"Flagged expected href sinks with {expected_severity}: {expected_sinks}"

  - name: no_false_positives
    description: Does not flag safe React text children as security violations
    if: "annotations.get('expect_violations') == False"
    check: |
      import re
      text = outputs.get("conversation", "")
      text_lower = text.lower()
      # Reject severity-tagged findings that name the safe fixtures
      finding_line = re.compile(
          r'\[(critical|high|warn)\].*(userdisplayname|trustedurl)',
          re.IGNORECASE
      )
      if finding_line.search(text):
          return False, "False positive — flagged safe patterns as security violations"
      if re.search(r'critical:\s*[1-9]', text_lower):
          return False, "False positive — reported critical findings for safe code"
      # Accept explicit no-findings language (even when naming safe identifiers)
      if re.search(
          r'(critical:\s*0|no (security )?(findings|violations|issues)|0 (critical|findings))',
          text_lower,
      ):
          return True, "Explicit no-findings result for safe PF patterns"
      return True, "No false positives for safe PF patterns"

thresholds:
  flags_xss_risk:
    min_pass_rate: 1.0
  flags_insecure_href:
    min_pass_rate: 1.0
  no_false_positives:
    min_pass_rate: 1.0
