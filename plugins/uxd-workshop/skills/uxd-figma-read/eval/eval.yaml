name: uxd-figma-read-eval
description: Evaluate uxd-figma-read's URL parsing, credential gating, and frame-vs-page screenshot selection

skill: uxd-workshop:uxd-figma-read

execution:
  mode: case
  arguments: "{prompt}"

runner:
  type: claude-code

models:
  skill: claude-sonnet-4-6
  judge: claude-sonnet-4-6

permissions:
  allow: []
  deny:
    - "mcp__*"

dataset:
  path: cases
  schema: |
    Each case directory contains:
    - input.yaml: prompt field with a realistic user request
    - annotations.yaml: case_type for conditional judges
    - Optional fixture files (e.g. metadata XML) the prompt references

outputs:
  - path: artifacts
    schema: |
      Judges check conversation text. No file artifacts are required;
      this skill returns parsed IDs, credential prompts, or screenshot
      node selections in the conversation.

traces:
  stdout: true
  stderr: true
  events: true
  metrics: true

judges:
  - name: parses_file_key_and_node_id
    description: Extracts file key and converts URL node-id dashes to API colons
    if: "annotations.get('case_type') == 'url-parse'"
    check: |
      text = outputs.get("conversation", "")
      file_key = annotations.get("expected_file_key", "AbCdEfGhIjKlMnOp")
      api_node = annotations.get("expected_api_node_id", "16:1047")
      url_node = annotations.get("url_node_id", "16-1047")
      if file_key not in text:
          return False, f"File key {file_key} not found in output"
      if api_node not in text:
          return False, f"API node ID {api_node} not found (expected dash-to-colon conversion from {url_node})"
      return True, f"Parsed file key and converted node ID to {api_node}"

  - name: asks_for_credentials
    description: Stops and asks for Figma MCP or FIGMA_PAT when neither is available
    if: "annotations.get('case_type') == 'missing-credentials'"
    check: |
      import re
      text = outputs.get("conversation", "")
      asks_pat = re.search(r"FIGMA_PAT|personal access token|access token", text, re.IGNORECASE)
      asks_mcp = re.search(r"Figma MCP|connect.*MCP|MCP.*Figma", text, re.IGNORECASE)
      if not asks_pat and not asks_mcp:
          return False, "Did not ask for FIGMA_PAT or Figma MCP connection"
      invented = re.search(
          r"(page names?|frame names?|screenshot|design tokens).{0,80}(Option|V2|Final|Explor)",
          text,
          re.IGNORECASE,
      )
      if invented:
          return False, "Appears to invent Figma file contents without credentials"
      return True, "Asked for credentials and did not invent file contents"

  - name: chooses_frame_not_page
    description: Selects frame node IDs for screenshots, not the page ID
    if: "annotations.get('case_type') == 'frame-not-page'"
    check: |
      import re
      text = outputs.get("conversation", "")
      page_id = annotations.get("page_id", "0:1")
      frame_ids = annotations.get("frame_ids", ["16:1047", "16:1048"])
      found_frames = [fid for fid in frame_ids if fid in text]
      if len(found_frames) < 1:
          return False, f"No frame IDs from {frame_ids} found in screenshot selection"
      # Fail if the only node recommended for screenshots is the page
      screenshot_mentions = re.findall(
          r"screenshot[^\n]{0,120}", text, re.IGNORECASE
      )
      page_as_screenshot = False
      for mention in screenshot_mentions:
          if page_id in mention and not any(fid in mention for fid in frame_ids):
              page_as_screenshot = True
      if page_as_screenshot and len(found_frames) == 0:
          return False, f"Recommended page ID {page_id} for screenshots instead of frames"
      # Stronger check: if it explicitly says to screenshot the page node alone
      bad = re.search(
          r"screenshot.{0,40}" + re.escape(page_id) + r"(?!.*(?:frame|16:))",
          text,
          re.IGNORECASE | re.DOTALL,
      )
      if bad and not found_frames:
          return False, f"Chose page node {page_id} for screenshots"
      return True, f"Selected frame IDs for screenshots: {found_frames}"

thresholds:
  parses_file_key_and_node_id:
    min_pass_rate: 1.0
  asks_for_credentials:
    min_pass_rate: 1.0
  chooses_frame_not_page:
    min_pass_rate: 1.0
