# UX Quality Rubric
# Scoring criteria for prototype review. Each dimension scored 0-2.
# Total possible: 6. Pass threshold: 5+ with no zeros.

rubric:
  version: "1.0"
  pass_threshold: 5
  min_per_dimension: 1

dimensions:
  completeness:
    name: Completeness
    weight: 1
    description: >
      Does the prototype cover the user stories and acceptance criteria
      from the source RFE?
    scores:
      0:
        label: Fail
        criteria:
          - Major user stories are missing entirely
          - Core flow is not represented
          - Prototype addresses a different problem than the RFE describes
      1:
        label: Partial
        criteria:
          - Primary user story is represented but secondary stories are missing
          - Happy path exists but acceptance criteria are only partially covered
          - Some key screens or states are placeholder-only
      2:
        label: Pass
        criteria:
          - All user stories from the RFE are represented in the prototype
          - Acceptance criteria are visibly addressed (user can trace criteria to screens)
          - Core flow and at least one alternate flow are present

  usability:
    name: Usability
    weight: 1
    description: >
      Is the interaction pattern clear and free of obvious friction?
      Evaluated against Nielsen's 10 usability heuristics.
    scores:
      0:
        label: Fail
        criteria:
          - Navigation is confusing or broken
          - User cannot complete the primary task without guessing
          - Violates 3+ Nielsen heuristics severely
      1:
        label: Partial
        criteria:
          - Primary task is completable but has friction points
          - Some heuristic violations present (missing feedback, unclear labels)
          - Error states are not handled
      2:
        label: Pass
        criteria:
          - Primary task flow is clear and intuitive
          - System status is visible throughout the flow
          - Labels and terminology are consistent and clear
          - Error prevention or recovery is considered

  feasibility:
    name: Feasibility
    weight: 1
    description: >
      Can this prototype be built with the target design system?
      Are there components that don't exist or require significant custom work?
    scores:
      0:
        label: Fail
        criteria:
          - Relies heavily on components that don't exist in the design system
          - Layout patterns are incompatible with the framework
          - Would require building a custom design system
      1:
        label: Partial
        criteria:
          - Mostly uses existing components but 1-2 require custom development
          - Some interactions would need custom JavaScript beyond the framework
          - Layout is achievable but may need adaptation
      2:
        label: Pass
        criteria:
          - All components exist in the design system or have close equivalents
          - Layout uses standard grid/flex patterns from the framework
          - Interactions align with existing component APIs

# Nielsen's 10 Usability Heuristics (reference for usability reviewers)
nielsen_heuristics:
  - id: visibility
    name: Visibility of system status
    description: The system should always keep users informed about what is going on
  - id: match
    name: Match between system and the real world
    description: The system should speak the users' language
  - id: control
    name: User control and freedom
    description: Users need a clearly marked emergency exit
  - id: consistency
    name: Consistency and standards
    description: Users should not have to wonder whether different words, situations, or actions mean the same thing
  - id: prevention
    name: Error prevention
    description: Even better than good error messages is a careful design which prevents a problem from occurring
  - id: recognition
    name: Recognition rather than recall
    description: Minimize the user's memory load
  - id: flexibility
    name: Flexibility and efficiency of use
    description: Accelerators for expert users
  - id: aesthetic
    name: Aesthetic and minimalist design
    description: Dialogues should not contain information which is irrelevant or rarely needed
  - id: recovery
    name: Help users recognize, diagnose, and recover from errors
    description: Error messages should be expressed in plain language
  - id: help
    name: Help and documentation
    description: It may be necessary to provide help and documentation
